openapi: "3.1.0"
info:
  title: Shop API
  version: "1.0.0"
  description: REST API интернет-магазина (вариант 2 — по мотивам Ozon). Три микросервиса — User, Product, Cart — за единым Nginx API Gateway.

servers:
  - url: http://localhost
    description: Локальный API Gateway (Nginx :80)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserCreate:
      type: object
      required: [login, first_name, last_name, password]
      properties:
        login:
          type: string
          example: Mikhail
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        password:
          type: string
          example: password

    UserOut:
      type: object
      properties:
        id:
          type: integer
          example: 1
        login:
          type: string
          example: Mikhail
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe

    UserWithToken:
      allOf:
        - $ref: '#/components/schemas/UserOut'
        - type: object
          properties:
            access_token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            token_type:
              type: string
              example: bearer

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: Mikhail
        password:
          type: string
          example: password

    ProductCreate:
      type: object
      required: [name, description, price]
      properties:
        name:
          type: string
          example: iPhone 15
        description:
          type: string
          example: Apple smartphone 6.1"
        price:
          type: number
          format: float
          exclusiveMinimum: 0
          example: 79990.00
        image_url:
          type: string
          nullable: true
          example: https://example.com/iphone15.jpg
        category:
          type: string
          default: электроника
          example: электроника
        tags:
          type: array
          items:
            type: string
          default: []
          example: ["смартфон", "apple", "ios"]
        attributes:
          type: object
          additionalProperties: true
          default: {}
          example: {"color": "black", "storage": "256GB"}
        images:
          type: array
          items:
            type: string
          default: []
          example: ["https://example.com/img1.jpg"]

    ProductOut:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: iPhone 15
        description:
          type: string
          example: Apple smartphone 6.1"
        price:
          type: number
          format: float
          example: 79990.00
        image_url:
          type: string
          nullable: true
          example: https://example.com/iphone15.jpg

    ExtendedAttrs:
      type: object
      properties:
        category:
          type: string
          nullable: true
          example: электроника
        tags:
          type: array
          items:
            type: string
          example: ["смартфон", "apple"]
        images:
          type: array
          items:
            type: string
          example: ["https://example.com/img1.jpg"]
        attributes:
          type: object
          additionalProperties: true
          example: {"color": "black", "storage": "256GB"}
        rating:
          type: number
          format: float
          example: 4.8
        review_count:
          type: integer
          example: 1024

    ProductExtended:
      allOf:
        - $ref: '#/components/schemas/ProductOut'
        - type: object
          properties:
            extended_attrs:
              $ref: '#/components/schemas/ExtendedAttrs'
              nullable: true

    ProductListOut:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductOut'
        total:
          type: integer
          example: 42
        skip:
          type: integer
          example: 0
        limit:
          type: integer
          example: 20

    ProductExtendedListOut:
      type: object
      description: Возвращается при поиске по тегам (параметр tags). Не содержит total/skip/limit — пагинация не поддерживается, максимум 100 результатов.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductExtended'

    ProductAttrsUpdate:
      type: object
      description: Все поля опциональны. Пустой запрос трактуется как no-op.
      properties:
        category:
          type: string
          nullable: true
          example: электроника
        tags:
          type: array
          items:
            type: string
          nullable: true
          example: ["смартфон", "новинка"]
        attributes:
          type: object
          additionalProperties: true
          nullable: true
          example: {"color": "white"}
        images:
          type: array
          items:
            type: string
          nullable: true
          example: ["https://example.com/new.jpg"]

    CartItemCreate:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          default: 1
          example: 2

    CartItemOut:
      type: object
      properties:
        id:
          type: integer
          example: 5
        user_id:
          type: integer
          example: 1
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        product_name:
          type: string
          nullable: true
          example: iPhone 15
        price:
          type: number
          nullable: true
          example: 79990.00

    CartOut:
      type: object
      properties:
        user_id:
          type: integer
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemOut'
        total_price:
          type: number
          example: 159980.00

    ErrorOut:
      type: object
      properties:
        detail:
          type: string
          example: Not found

tags:
  - name: auth
    description: Регистрация и аутентификация
  - name: users
    description: Управление пользователями
  - name: products
    description: Каталог товаров
  - name: cart
    description: Корзина покупателя

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
            example:
              login: Mikhail
              first_name: John
              last_name: Doe
              password: password
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithToken'
        "409":
          description: Логин уже занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorOut'
              example:
                detail: Login already taken
        "422":
          description: Ошибка валидации

  /auth/login:
    post:
      tags: [auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: Mikhail
              password: password
      responses:
        "200":
          description: Успешная аутентификация — возвращает данные пользователя и токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithToken'
        "401":
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorOut'
              example:
                detail: Invalid credentials

  /users/by-login:
    get:
      tags: [users]
      summary: Поиск пользователя по логину
      security:
        - BearerAuth: []
      parameters:
        - name: login
          in: query
          required: true
          schema:
            type: string
          example: Mikhail
      responses:
        "200":
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        "401":
          description: Не авторизован
        "404":
          description: Пользователь не найден

  /users/search:
    get:
      tags: [users]
      summary: Поиск пользователей по маске имени/фамилии
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Подстрока для поиска в first_name или last_name
          example: Jo
      responses:
        "200":
          description: Список совпадений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserOut'
        "401":
          description: Не авторизован

  /products:
    get:
      tags: [products]
      summary: Список товаров
      description: |
        Без параметра `tags` — возвращает постраничный список (ProductListOut).
        С параметром `tags` — ищет по тегам через MongoDB и возвращает расширенные данные (ProductExtendedListOut).
        При использовании `tags` параметры `skip` и `limit` игнорируются, максимум 100 результатов.
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: "Теги через запятую: смартфон,apple"
          example: "смартфон,apple"
      responses:
        "200":
          description: Список товаров
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ProductListOut'
                  - $ref: '#/components/schemas/ProductExtendedListOut'
    post:
      tags: [products]
      summary: Создать товар
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
            example:
              name: iPhone 15
              description: Apple smartphone 6.1"
              price: 79990.00
              image_url: https://example.com/iphone15.jpg
              category: электроника
              tags: ["смартфон", "apple", "ios"]
              attributes:
                color: black
                storage: 256GB
              images: ["https://example.com/iphone15.jpg"]
      responses:
        "201":
          description: Товар создан — возвращает данные вместе с extended_attrs из MongoDB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductExtended'
        "401":
          description: Не авторизован
        "422":
          description: Ошибка валидации (в т.ч. price ≤ 0)

  /products/{id}:
    get:
      tags: [products]
      summary: Получить товар по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: extended
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Включить расширенные атрибуты из MongoDB
      responses:
        "200":
          description: Товар найден. При extended=true включает extended_attrs из MongoDB.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductExtended'
        "404":
          description: Товар не найден
    delete:
      tags: [products]
      summary: Удалить товар (из PostgreSQL и MongoDB)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "204":
          description: Товар удалён
        "401":
          description: Не авторизован
        "404":
          description: Товар не найден

  /products/{id}/attrs:
    put:
      tags: [products]
      summary: Обновить расширенные атрибуты товара в MongoDB
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductAttrsUpdate'
            example:
              tags: ["смартфон", "новинка"]
              category: электроника
              attributes:
                color: white
      responses:
        "200":
          description: Атрибуты обновлены
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: updated
        "401":
          description: Не авторизован
        "404":
          description: Товар не найден в MongoDB

  /cart/items:
    post:
      tags: [cart]
      summary: Добавить товар в корзину
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemCreate'
            example:
              product_id: 1
              quantity: 2
      responses:
        "201":
          description: Товар добавлен в корзину
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItemOut'
        "401":
          description: Не авторизован
        "404":
          description: Товар не найден

  /cart:
    get:
      tags: [cart]
      summary: Получить корзину текущего пользователя
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Корзина пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartOut'
              example:
                user_id: 1
                items:
                  - id: 5
                    user_id: 1
                    product_id: 1
                    quantity: 2
                    product_name: iPhone 15
                    price: 79990.00
                total_price: 159980.00
        "401":
          description: Не авторизован
