version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: shop
      RABBITMQ_DEFAULT_PASS: shop
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      DB_URL: postgresql://shop:shop@postgres:5432/shop
      RABBITMQ_URL: amqp://shop:shop@rabbitmq:5672/
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  product-service:
    build: ./services/product-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
      DB_URL: postgresql://shop:shop@postgres:5432/shop
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB_NAME: ozon_shop
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://shop:shop@rabbitmq:5672/
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  cart-service:
    build: ./services/cart-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
      DB_URL: postgresql://shop:shop@postgres:5432/shop
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    environment:
      RABBITMQ_URL: amqp://shop:shop@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    image: nginx:1.25-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - cart-service

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
