version: "3.9"

services:
  user-service:
    build: ./services/user-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
    ports:
      - "8001:8000"

  product-service:
    build: ./services/product-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
    ports:
      - "8002:8000"

  cart-service:
    build: ./services/cart-service
    environment:
      JWT_SECRET: CHANGEME
      JWT_ALGORITHM: HS256
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - product-service
    ports:
      - "8003:8000"

  api-gateway:
    image: nginx:1.25-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - cart-service
