events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $remote_addr zone=auth_zone:10m rate=10r/s;
    limit_req_zone $remote_addr zone=api_zone:10m rate=50r/s;

    limit_req_status 429;

    server {
        listen 80;

        location /auth/ {
            set $upstream http://user-service:8000;
            limit_req zone=auth_zone burst=5 nodelay;
            add_header X-RateLimit-Limit "10" always;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /users/ {
            set $upstream http://user-service:8000;
            limit_req zone=api_zone burst=20 nodelay;
            add_header X-RateLimit-Limit "50" always;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /products {
            set $upstream http://product-service:8000;
            limit_req zone=api_zone burst=20 nodelay;
            add_header X-RateLimit-Limit "50" always;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /cart {
            set $upstream http://cart-service:8000;
            limit_req zone=api_zone burst=20 nodelay;
            add_header X-RateLimit-Limit "50" always;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        error_page 429 @rate_limit;
        location @rate_limit {
            default_type application/json;
            return 429 '{"detail": "Too Many Requests"}';
        }
    }
}
